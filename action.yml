name: 'Validate jackin Agent'
description: 'Validates a jackin agent repo against the project contract and builds the Docker image multi-platform'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  path:
    description: 'Path to the agent repo'
    required: false
    default: '.'
  jackin-version:
    description: 'Version of jackin-validate to download (e.g. "0.5.0" or "latest")'
    required: false
    default: 'latest'
  build-platforms:
    description: 'Comma-separated Docker platforms to build'
    required: false
    default: 'linux/amd64,linux/arm64'
  skip-build:
    description: 'Skip the Docker build step'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Download jackin-validate
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: ${{ github.action_path }}/scripts/download-validator.sh "${{ inputs.jackin-version }}"

    - name: Validate agent repo
      shell: bash
      run: jackin-validate "${{ inputs.path }}"

    - name: Set up QEMU
      if: inputs.skip-build != 'true'
      uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0

    - name: Set up Docker Buildx
      if: inputs.skip-build != 'true'
      uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

    - name: Build Docker image
      if: inputs.skip-build != 'true'
      shell: bash
      run: ${{ github.action_path }}/scripts/build-image.sh "${{ inputs.path }}" "${{ inputs.build-platforms }}"
