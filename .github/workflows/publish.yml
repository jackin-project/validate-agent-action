name: Publish Agent Image

on:
  workflow_call:
    inputs:
      jackin-version:
        description: 'Version of jackin-role to download'
        type: string
        default: 'latest-build'
      registry:
        description: 'Registry URL for docker login'
        type: string
        default: 'https://index.docker.io/v1/'
      runner-amd64:
        description: 'Runner label for linux/amd64 build job'
        type: string
        default: 'ubuntu-24.04'
      runner-arm64:
        description: 'Runner label for linux/arm64 build job. When set to the same value as runner-amd64, QEMU is used for cross-platform emulation.'
        type: string
        default: 'ubuntu-24.04-arm'
      runner-merge:
        description: 'Runner label for the manifest merge and sign job'
        type: string
        default: 'ubuntu-24.04'
    secrets:
      registry-username:
        required: true
      registry-password:
        required: true
      gh-readonly-token:
        required: false
        description: 'Read-only GitHub token for authenticated API access (avoids rate limiting when downloading dependencies)'

jobs:
  validate-and-config:
    runs-on: ${{ inputs.runner-amd64 }}
    outputs:
      image: ${{ steps.config.outputs.image }}
      construct_version: ${{ steps.config.outputs.construct_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download jackin-role
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.jackin-version }}"
          REPO="jackin-project/jackin"
          WORKFLOW_FILE="ci.yml"

          case "$(uname -m)" in
            x86_64)  TARGET="x86_64-unknown-linux-gnu" ;;
            aarch64) TARGET="aarch64-unknown-linux-gnu" ;;
            *) echo "Unsupported architecture: $(uname -m)" >&2; exit 1 ;;
          esac

          if [ "$VERSION" = "latest" ] || [ "$VERSION" = "latest-build" ]; then
            ARTIFACT_NAME="jackin-role-${TARGET}"
            ARTIFACT_DIR="/tmp/jackin-role-artifact"
            ARTIFACT_ZIP="/tmp/jackin-role-artifact.zip"
            run_id=""
            while IFS= read -r candidate_id; do
              candidate_artifact_id=$(gh api -X GET "repos/${REPO}/actions/runs/${candidate_id}/artifacts" \
                --jq "[.artifacts[] | select(.name == \"${ARTIFACT_NAME}\")] | .[0].id // empty")
              if [ -n "$candidate_artifact_id" ]; then
                run_id="$candidate_id"
                artifact_id="$candidate_artifact_id"
                break
              fi
            done < <(gh api -X GET "repos/${REPO}/actions/workflows/${WORKFLOW_FILE}/runs" \
              -f branch=main -f per_page=20 \
              --jq '[.workflow_runs[] | select(.status == "completed" and .conclusion == "success")] | .[].id')
            [ -z "$run_id" ] && { echo "Failed to resolve preview build" >&2; exit 1; }
            rm -rf "$ARTIFACT_DIR" "$ARTIFACT_ZIP"
            gh api -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/actions/artifacts/${artifact_id}/zip" > "$ARTIFACT_ZIP"
            unzip -oq "$ARTIFACT_ZIP" -d "$ARTIFACT_DIR"
            archive=$(find "$ARTIFACT_DIR" -maxdepth 1 -name 'jackin-role-*.tar.gz' -print -quit)
            checksum=$(find "$ARTIFACT_DIR" -maxdepth 1 -name 'jackin-role-*.tar.gz.sha256' -print -quit)
            (cd "$ARTIFACT_DIR" && sha256sum --check "$(basename "$checksum")")
            tar -xzf "$archive" -C /tmp jackin-role
          else
            VERSION_CLEAN="${VERSION#v}"
            TAG="v${VERSION_CLEAN}"
            VERSION_NUM="${TAG#v}"
            ARCHIVE="jackin-${VERSION_NUM}-${TARGET}.tar.gz"
            curl -fsSL "https://github.com/${REPO}/releases/download/${TAG}/${ARCHIVE}" -o "/tmp/${ARCHIVE}"
            curl -fsSL "https://github.com/${REPO}/releases/download/${TAG}/${ARCHIVE}.sha256" -o "/tmp/${ARCHIVE}.sha256"
            (cd /tmp && sha256sum --check "${ARCHIVE}.sha256")
            tar -xzf "/tmp/${ARCHIVE}" -C /tmp jackin-role
          fi

          chmod +x /tmp/jackin-role
          echo "/tmp" >> "$GITHUB_PATH"

      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          # DL3004: construct base image intentionally exposes sudo for dev containers.
          # Per-repo .hadolint.yaml can add further suppressions.
          ignore: DL3004
          failure-threshold: error
          config: .hadolint.yaml

      - name: Validate and extract published image
        id: config
        run: |
          jackin-role validate .
          raw=$(jackin-role published-image)
          echo "image=${raw%:*}" >> $GITHUB_OUTPUT
          echo "construct_version=$(jackin-role construct-version .)" >> $GITHUB_OUTPUT

  build:
    needs: validate-and-config
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ${{ inputs.runner-amd64 }}
          - platform: linux/arm64
            runner: ${{ inputs.runner-arm64 }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        if: inputs.runner-amd64 == inputs.runner-arm64 && matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.registry-username }}
          password: ${{ secrets.registry-password }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: docker-container

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        id: build
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name=${{ needs.validate-and-config.outputs.image }},push=true
          build-args: |
            CONSTRUCT_VERSION=${{ needs.validate-and-config.outputs.construct_version }}
            ROLE_GIT_SHA=${{ github.sha }}
          secrets: |
            github_token=${{ secrets.gh-readonly-token || github.token }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'linux-amd64' || 'linux-arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [validate-and-config, build]
    runs-on: ${{ inputs.runner-merge }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.registry-username }}
          password: ${{ secrets.registry-password }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: docker-container

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        id: meta
        with:
          images: ${{ needs.validate-and-config.outputs.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ needs.validate-and-config.outputs.image }}@sha256:%s ' *)

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          cosign sign --yes $(echo "$TAGS" | tr '\n' ' ')