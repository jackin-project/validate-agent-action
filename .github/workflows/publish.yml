name: Publish Agent Image

on:
  workflow_call:
    inputs:
      jackin-version:
        description: 'Version of jackin-role to download'
        type: string
        default: 'latest-build'
      registry:
        description: 'Registry URL for docker login'
        type: string
        default: 'https://index.docker.io/v1/'
    secrets:
      registry-username:
        required: true
      registry-password:
        required: true

jobs:
  validate-and-config:
    runs-on: ubuntu-24.04
    outputs:
      image: ${{ steps.config.outputs.image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: jackin-project/jackin-role-action
          ref: ${{ github.action_ref }}
          path: .jackin-role-action

      - name: Download jackin-role
        env:
          GH_TOKEN: ${{ github.token }}
          JACKIN_VERSION: ${{ inputs.jackin-version }}
        run: .jackin-role-action/scripts/download-jackin-role.sh "$JACKIN_VERSION"

      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

      - name: Validate and extract published image
        id: config
        run: |
          jackin-role validate .
          raw=$(jackin-role published-image)
          echo "image=${raw%:*}" >> $GITHUB_OUTPUT

  build:
    needs: validate-and-config
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.registry-username }}
          password: ${{ secrets.registry-password }}

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        id: build
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name=${{ needs.validate-and-config.outputs.image }},push=true
          secrets: |
            github_token=${{ github.token }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'linux-amd64' || 'linux-arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [validate-and-config, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.registry-username }}
          password: ${{ secrets.registry-password }}

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        id: meta
        with:
          images: ${{ needs.validate-and-config.outputs.image }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ needs.validate-and-config.outputs.image }}@sha256:%s ' *)

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            $(jq -cr '.tags | map("\"" + . + "\"") | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
